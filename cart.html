<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link
        rel="stylesheet"
        href="./cart.css"
    />
</head>
<body>
    <div class="diffpage" id="cart">
        <section>
            <input type="radio" name="tabs" id="cartbutton">
            <label for="cartbutton">Cart</label>
            <input type="radio" name="tabs" id="ordersbutton">
            <label for="ordersbutton">Orders</label>

            <div class="tab-content" id="cart-content">
                <h2>My Cart</h2>
                <p>No items in Cart currently</p>
            </div>


            <div class="tab-content" id="orders-content">
                <h2>My Orders</h2>  
                <p>No prior Orders made</p>
            </div>
        </section>
        <a href="./Amazon.html" class="button"><button>Close Cart</button></a>
    </div>
</body>
</html>
